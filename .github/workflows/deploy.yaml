name: Deploy jap-mala Application on EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_CONFIG="${{ secrets.NEXT_PUBLIC_FIREBASE_CONFIG }}" \
          -t $IMAGE_NAME .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME

      - name: SSH in EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_TOKEN }}
          script: |
            cd /home/ubuntu/my-app
            sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            sudo docker pull ${{ secrets.IMAGE_NAME }}
            sudo docker stop naam-jaap || true
            sudo docker rm naam-jaap || true
            sudo docker run -d \
              --name naam-jaap \
              --env-file .env.local \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ secrets.IMAGE_NAME }}



